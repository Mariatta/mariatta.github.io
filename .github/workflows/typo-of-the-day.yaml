name: Typo of the Day import

on:
  schedule:
    # Daily at 15:00 UTC (08:00 Vancouver / 07:00 PDT)
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run fetch mastodon script
        env:
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
        run: python scripts/fetch_typooftheday.py

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: typo-of-the-day/import
          commit-message: 'Import new #typooftheday posts from Mastodon'
          title: 'Import new #typooftheday posts from Mastodon'
          body: |
            Automated import of new `#typooftheday` toots from Mastodon.

            Generated by `.github/workflows/typo-of-the-day.yaml` running `scripts/fetch_typooftheday.py`.

            Review the new post(s) under `content/posts/typo_of_the_day/` and merge when ready.
          add-paths: |
            content/posts/typo_of_the_day/**
          delete-branch: true